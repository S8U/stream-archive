# 로깅 설정 (운영은 INFO)
logging:
  level:
    com.github.s8u.streamarchive: INFO

# JWT 쿠키 (운영은 https라 secure)
jwt:
  cookie:
    secure: true
    domain: ${COOKIE_DOMAIN:yourdomain.com}

# 스토리지 설정
storage:
  base-path: ${STORAGE_BASE_PATH:/var/stream-archive/storage}

# URL 설정
url:
  api-base: ${API_BASE_URL:https://api.yourdomain.com}
  frontend-base: ${FRONTEND_BASE_URL:https://yourdomain.com}
