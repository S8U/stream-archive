spring:
  application:
    name: stream-archive

  # Docker Compose 설정
  docker:
    compose:
      enabled: false
  #      file: docker-compose-local.yml

  # 데이터베이스 설정
  datasource:
    url: jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:stream_archive}
    username: ${DB_USERNAME:stream_archive_app}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.mariadb.jdbc.Driver

  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true

  # 보안 설정
  security:
    user:
      name: ${ADMIN_USERNAME:admin}
      password: ${ADMIN_PASSWORD:admin}

# 서버 설정
server:
  port: ${SERVER_PORT:8080}

# 로깅 설정
logging:
  level:
    com.github.s8u.streamarchive: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%level] %logger{36} - %msg%n"
  file:
    name: backend/logs/stream-archive.log
  logback:
    rollingpolicy:
      file-name-pattern: backend/logs/stream-archive-%d{yyyy-MM-dd}.%i.log
      max-file-size: 10MB
      max-history: 30
      total-size-cap: 1GB

# 모니터링 엔드포인트
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

# JWT 설정
jwt:
  secret: ${JWT_SECRET:your_super_secret_jwt_key_change_this_in_production}
  access-token-expiration: 1800000 # 30분 (밀리초)
  refresh-token-expiration: 2592000000 # 30일 (밀리초)
  cookie:
    secure: false
    same-site: Lax
    http-only: true
    path: /auth

# 플랫폼 설정
platform:
  twitch:
    app-client-id: ${TWITCH_APP_CLIENT_ID:your_client_id}
    app-client-secret: ${TWITCH_APP_CLIENT_SECRET:your_client_secret}
    personal-oauth-token: ${TWITCH_PERSONAL_OAUTH_TOKEN:your_personal_token}

# 스토리지 설정
storage:
  base-path: ${STORAGE_BASE_PATH:./storage}